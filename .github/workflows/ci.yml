name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Run container
        run: docker run -d -p 5001:5001 --name events-api-container events-api:latest

      - name: Wait for API to be ready
        run: sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -v

      - name: Stop and remove container
        run: |
          docker stop events-api-container
          docker rm events-api-container

  deploy:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment configuration
        id: deploy-config
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          missing=0
          for secret_name in DOCKERHUB_USERNAME DOCKERHUB_TOKEN RENDER_DEPLOY_HOOK RENDER_BASE_URL; do
            if [ -z "${!secret_name}" ]; then
              echo "::warning::${secret_name} is not configured; skipping deployment."
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker login
        id: docker-login
        if: steps.deploy-config.outputs.ready == 'true'
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Confirm Docker login
        id: deploy-ready
        if: steps.deploy-config.outputs.ready == 'true'
        run: |
          if [ "${{ steps.docker-login.outcome }}" = "success" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Docker Hub login failed; skipping deployment. Verify DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image (amd64 for Render)
        if: steps.deploy-ready.outputs.ready == 'true'
        run: docker build --platform linux/amd64 -t ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest .

      - name: Push to Docker Hub
        if: steps.deploy-ready.outputs.ready == 'true'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest

      - name: Trigger Render deployment
        if: steps.deploy-ready.outputs.ready == 'true'
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Verify deployment (health check)
        if: steps.deploy-ready.outputs.ready == 'true'
        run: |
          sleep 30
          curl --fail ${{ secrets.RENDER_BASE_URL }}/api/health
