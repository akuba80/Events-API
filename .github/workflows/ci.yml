name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Run container
        run: docker run -d -p 5001:5001 --name events-api-container events-api:latest

      - name: Wait for API to be ready
        run: sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -v

      - name: Stop and remove container
        run: |
          docker stop events-api-container
          docker rm events-api-container

      - name: Docker login
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (amd64 for Render)
        if: github.event_name == 'push'
        run: docker build --platform linux/amd64 -t ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest .

      - name: Push to Docker Hub
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest

      - name: Trigger Render deployment
        if: github.event_name == 'push'
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Verify deployment (health check)
        if: github.event_name == 'push'
        run: |
          sleep 30
          curl --fail ${{ secrets.RENDER_BASE_URL }}/api/health